version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: java-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ecommerce.sql:/docker-entrypoint-initdb.d/ecommerce.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: java-web
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/test_db
      - DB_USERNAME=test
      - DB_PASSWORD=test
      - DB_DRIVER=org.postgresql.Driver
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
